name: Deploy Vite React App
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Install dependencies and build
        run: just build-ci

      - uses: actions/configure-pages@v4

      - name: Create SPA fallback
        run: cp iig-fusion/dist/index.html iig-fusion/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: iig-fusion/dist
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
